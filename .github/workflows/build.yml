name: Build Angular

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (which Environment secrets to use)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18.x'

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ubuntu-latest

    # ดึง secret API_URL จาก GitHub Environment ตามที่เลือก
    environment:
      name: ${{ inputs.target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject API_URL into environment.ts
        run: node scripts/set-env.js ${{ inputs.target }}
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Verify environment.ts
        run: cat src/environments/environment.ts

      - name: Build
        run: ng build --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.target }}-${{ github.sha }}
          path: dist/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
